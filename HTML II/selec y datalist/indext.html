<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select y datalist</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <form>
        <h2>Formulario de Contacto</h1>
        <div class="formulario">
            <label for="nombre">Nombre</label>
            <input type="text" placeholder="Juan Camilo" id="nombre">
        </div>
        <div class="formulario">
            <label for="correo">Correo</label>
            <input type="email" placeholder="Juan@Correo.com" id="correo">
        </div>
        <div class="formulario">
            <label for="Mensaje">Mensaje</label>
            <textarea id="Mensaje" placeholder="Escribe aqui"></textarea>
        </div>
        <div class="formulario">
            <label>Tipo de Usuario
                <select name="type-of-user">
                    <option value="user1">opcion 1</option>
                    <option value="user2">opcion 2</option>
                    <option value="user3">opcion 3</option>   
                </select>
            </label>
        </div>
        <div class="formulario">
            <label>Datalist
                <input list="referente" name="referente">
                <datalist id="referente" name="type-of-user">
                    <option>Juan</option>
                    <option>Camilo</option>
                    <option>Ortiz</option>   
                </datalist>
            </label>
        </div>
        <div class="formulario">
            <label>
                <input type="checkbox" class="checkbox">
                Acepto los <a href="terms.html" target="_blank">Terminos y Condiciones</a>
            </label>
        </div>
    </form>
    
</body>
</html>
