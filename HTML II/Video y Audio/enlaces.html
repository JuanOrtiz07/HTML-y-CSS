<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video y Audio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <video controls autoplay muted src="Video.mp4"> <track src="captions.vtt" default kind="subtitles" srclang="es" label="Español">Tu navegador no soporta el elemento de video.</video>
    <audio controls autoplay muted src="Video.mp4">Tu navegador no soporta el elemento de audio.</audio>
    <p>Es siempre mejor el audio cargarlo en formato mp3, ya que asi el navegador no tendra que cargar el video y despues convertirlo a audio.</p>
</body>
</html>
